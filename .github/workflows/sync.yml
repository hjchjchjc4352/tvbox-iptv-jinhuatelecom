name: Sync and Rewrite IPTV

on:
  schedule:
    - cron: "0 5 * * 1"   # 每周一执行
  workflow_dispatch:      # 允许手动执行

jobs:
  sync:
    runs-on: ubuntu-latest
    # --- 新增下面这两行，解决 Node.js 20 弃用警告 ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download upstream IPTV file
        run: |
          curl -L "https://raw.githubusercontent.com/FHZDCJ/Zhejiang_Telecom_IPTV/main/Hangzhou_Unicast/Hangzhou_Telecom_Unicast.txt" \
            -o upstream.txt
      
      - name: Download upstream IPTV logo m3u
        run: |
          curl -L "https://raw.githubusercontent.com/FHZDCJ/Zhejiang_Telecom_IPTV/main/Hangzhou_Unicast/Hangzhou_Telecom_Unicast_ONLINE_LOGO.m3u" \
            -o Hangzhou_Telecom_Unicast_ONLINE_LOGO.m3u

      - name: Run rewrite script
        run: python rewrite.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add jinhuatelecomiptv.txt jinhuatelecomiptv.m3u oneiptv.txt oneiptv.m3u
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto sync & rewrite IPTV"
            git push
          else
            echo "No changes to commit"
          fi
